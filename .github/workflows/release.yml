name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp/package-lock.json
      - run: npm ci
        working-directory: mcp
      - run: npm run build:plugin
        working-directory: mcp
      - name: Verify generated Codex plugin is current
        run: git diff --exit-code -- plugins/html-share-publisher
      - run: npm test
        working-directory: mcp
      - name: Verify bundled Codex plugin MCP
        run: node plugins/html-share-publisher/scripts/verify.cjs plugins/html-share-publisher/mcp/server.mjs
      - name: Test installer and launcher
        run: node --test installer/*.test.mjs
      - name: Build release assets
        run: bash scripts/build-release.sh "$GITHUB_REF_NAME"
      - name: Test release installation
        run: |
          mkdir -p "$RUNNER_TEMP/release"
          tar -xzf output/releases/html-share-publisher.tar.gz -C "$RUNNER_TEMP/release"
          CODEX_HOME="$RUNNER_TEMP/codex-home" \
            bash "$RUNNER_TEMP/release/html-share-publisher/install.sh" \
              --version v0.0.0-old \
              --install-root "$RUNNER_TEMP/install" \
              --client generic \
              --skip-api-check
          CODEX_HOME="$RUNNER_TEMP/codex-home" \
            bash "$RUNNER_TEMP/release/html-share-publisher/install.sh" \
              --version "$GITHUB_REF_NAME" \
              --install-root "$RUNNER_TEMP/install" \
              --client generic \
              --skip-api-check
          test "$(readlink "$RUNNER_TEMP/install/current")" = "$RUNNER_TEMP/install/releases/$GITHUB_REF_NAME"
          test -f "$RUNNER_TEMP/install/launcher.mjs"
          test "$(cat "$RUNNER_TEMP/install/VERSION")" = "$GITHUB_REF_NAME"
          node "$RUNNER_TEMP/install/current/mcp/scripts/verify-install.mjs" "$RUNNER_TEMP/install/launcher.mjs"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            output/releases/html-share-publisher.tar.gz \
            output/releases/html-share-publisher.tar.gz.sha256 \
            --title "HTML Share Publisher $GITHUB_REF_NAME" \
            --generate-notes
