name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp/package-lock.json
      - run: npm ci
        working-directory: mcp
      - run: npm test
        working-directory: mcp
      - name: Build release assets
        run: bash scripts/build-release.sh "$GITHUB_REF_NAME"
      - name: Test release installation
        run: |
          mkdir -p "$RUNNER_TEMP/release"
          tar -xzf output/releases/html-share-publisher.tar.gz -C "$RUNNER_TEMP/release"
          CODEX_HOME="$RUNNER_TEMP/codex-home" \
            bash "$RUNNER_TEMP/release/html-share-publisher/install.sh" \
              --version "$GITHUB_REF_NAME" \
              --install-root "$RUNNER_TEMP/install" \
              --skip-register \
              --skip-api-check
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            output/releases/html-share-publisher.tar.gz \
            output/releases/html-share-publisher.tar.gz.sha256 \
            --title "HTML Share Publisher $GITHUB_REF_NAME" \
            --generate-notes
