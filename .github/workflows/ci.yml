name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp/package-lock.json
      - run: npm ci
        working-directory: mcp
      - run: npm run build:plugin
        working-directory: mcp
      - name: Verify generated Codex plugin is current
        run: git diff --exit-code -- plugins/html-share-publisher
      - run: npm test
        working-directory: mcp
      - run: npm run verify
        working-directory: mcp
      - name: Verify bundled Codex plugin MCP
        run: node plugins/html-share-publisher/scripts/verify.cjs plugins/html-share-publisher/mcp/server.mjs
      - name: Test installer and launcher
        run: node --test installer/*.test.mjs
      - name: Build release asset
        run: bash scripts/build-release.sh v0.0.0-ci
      - name: Test clean installation
        run: |
          mkdir -p "$RUNNER_TEMP/release"
          tar -xzf output/releases/html-share-publisher.tar.gz -C "$RUNNER_TEMP/release"
          CODEX_HOME="$RUNNER_TEMP/codex-home" \
            bash "$RUNNER_TEMP/release/html-share-publisher/install.sh" \
              --version v0.0.0-old \
              --install-root "$RUNNER_TEMP/install" \
              --client generic \
              --skip-api-check
          CODEX_HOME="$RUNNER_TEMP/codex-home" \
            bash "$RUNNER_TEMP/release/html-share-publisher/install.sh" \
              --version v0.0.0-ci \
              --install-root "$RUNNER_TEMP/install" \
              --client generic \
              --skip-api-check
          test -f "$RUNNER_TEMP/install/current/mcp/src/server.js"
          test -f "$RUNNER_TEMP/install/launcher.mjs"
          test -f "$RUNNER_TEMP/install/mcp-config.json"
          test "$(cat "$RUNNER_TEMP/install/VERSION")" = "v0.0.0-ci"
          test "$(readlink "$RUNNER_TEMP/install/current")" = "$RUNNER_TEMP/install/releases/v0.0.0-ci"
          node -e '
            const fs = require("fs");
            const config = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            if (config.mcpServers["html-share"].args[0] !== process.argv[2]) process.exit(1);
          ' "$RUNNER_TEMP/install/mcp-config.json" "$RUNNER_TEMP/install/launcher.mjs"
          node "$RUNNER_TEMP/install/current/mcp/scripts/verify-install.mjs" "$RUNNER_TEMP/install/launcher.mjs"

  windows-install:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test installer and launcher
        run: node --test installer/*.test.mjs
      - name: Test PowerShell installation
        shell: pwsh
        run: |
          ./install.ps1 `
            -Version v0.0.0-ci `
            -PayloadDir $PWD.Path `
            -InstallRoot "$env:RUNNER_TEMP/install" `
            -Client generic `
            -SkipApiCheck
          if (-not (Test-Path "$env:RUNNER_TEMP/install/releases/v0.0.0-ci/mcp/src/server.js")) { exit 1 }
          if (-not (Test-Path "$env:RUNNER_TEMP/install/launcher.mjs")) { exit 1 }
          if (-not (Test-Path "$env:RUNNER_TEMP/install/mcp-config.json")) { exit 1 }
          if ((Get-Content "$env:RUNNER_TEMP/install/VERSION" -Raw).Trim() -ne "v0.0.0-ci") { exit 1 }
          $Config = Get-Content "$env:RUNNER_TEMP/install/mcp-config.json" -Raw | ConvertFrom-Json
          $ExpectedLauncher = Join-Path (Join-Path $env:RUNNER_TEMP "install") "launcher.mjs"
          if ($Config.mcpServers.'html-share'.args[0] -ne $ExpectedLauncher) { exit 1 }
          & node "$env:RUNNER_TEMP/install/releases/v0.0.0-ci/mcp/scripts/verify-install.mjs" $ExpectedLauncher
          if ($LASTEXITCODE -ne 0) { exit 1 }
